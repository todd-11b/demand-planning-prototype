document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"124c2efc-bd27-4b6a-a3f2-790ec2bfa823\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<style>/* ============================================================\n   BARLEY BUS — Design Tokens\n   Mirrors remotion/src/constants/brand.ts (canonical source)\n   ============================================================ */\n\n/* ---------- Fonts ---------- */\n@font-face {\n  font-family: \"Oswald\";\n  src: url(\"e3d3be49-fba4-4392-9213-4b9d830fc69b\") format(\"woff2-variations\");\n  font-weight: 200 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"3338dff6-b728-49ab-8d21-023c35b515d4\") format(\"woff2\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"3792f42d-9792-43fc-8dad-cd198fcc45ba\") format(\"woff2\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"f8e6bd57-8b32-41de-9c7a-9b36faa888ca\") format(\"woff2\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"4b31ea63-1d06-4bd6-86ca-3def55edd04d\") format(\"woff2\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"05b9df04-4201-4b82-ba14-e9d192920a8f\") format(\"woff2\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Poppins\";\n  src: url(\"edb50e88-7409-4c11-8584-c480851155f0\") format(\"woff2\");\n  font-weight: 800;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- CORE PALETTE ----------\n     The night-out brand. Always pair purple/magenta on a dark-blue stage.\n     Never on white-on-white. The pink is the action color. */\n  --bb-purple:    #5400a5;   /* primary — the brand purple */\n  --bb-magenta:   #8b01aa;   /* secondary depth — between purple & fuchsia */\n  --bb-fuchsia:   #c50096;   /* mid-gradient color */\n  --bb-pink:      #fe4275;   /* CTA / action color */\n  --bb-blue:      #332176;   /* deep accent purple-blue */\n  --bb-dark-blue: #1b1150;   /* canonical background */\n  --bb-whiteish:  #f3e8f9;   /* soft off-white text on color */\n  --bb-white:     #ffffff;\n  --bb-black:     #000000;\n\n  /* Brass accent — used ONLY in lockup subtitles (\"Tours and Transportation\",\n     \"Kansas City\") and the \"be driven.\" sign-off rule. Never as a CTA or\n     primary fill. This is a typographic accent, not a palette color. */\n  --bb-brass:     #d9b673;\n\n  /* ---------- SEMANTIC ---------- */\n  --bb-bg:           var(--bb-dark-blue);\n  --bb-bg-deeper:    #120a3a;                      /* deeper than dark-blue, for layered surfaces */\n  --bb-surface:      rgba(255, 255, 255, 0.06);    /* glass card on dark */\n  --bb-surface-hi:   rgba(255, 255, 255, 0.10);    /* hover */\n  --bb-stroke:       rgba(255, 255, 255, 0.14);    /* hairline on dark */\n  --bb-stroke-hi:    rgba(255, 255, 255, 0.28);\n\n  --bb-fg:           var(--bb-white);              /* primary text on dark */\n  --bb-fg-muted:     rgba(255, 255, 255, 0.72);    /* secondary text */\n  --bb-fg-dim:       rgba(255, 255, 255, 0.55);    /* tertiary / captions */\n  --bb-fg-faint:     rgba(255, 255, 255, 0.30);    /* disabled / overline */\n\n  --bb-accent:       var(--bb-pink);               /* CTA */\n  --bb-accent-hover: #ff5a87;                      /* lifted pink */\n  --bb-accent-press: #e63465;                      /* pressed pink */\n\n  /* Status — used sparingly, brand is non-corporate */\n  --bb-success: #34d399;\n  --bb-warning: #fbbf24;\n  --bb-danger:  #ff4d6d;\n\n  /* ---------- GRADIENTS ---------- */\n  --bb-grad-accent:     linear-gradient(90deg, #5400a5, #c50096, #fe4275);\n  --bb-grad-statement:  linear-gradient(135deg, #1b1150, #5400a5, #c50096);\n  --bb-grad-stat-text:  linear-gradient(135deg, #5400a5, #c50096);\n  --bb-grad-photo:      linear-gradient(to top, rgba(27,17,80,0.95) 0%, rgba(27,17,80,0.7) 40%, transparent 70%);\n  --bb-grad-photo-deep: linear-gradient(to top, rgba(27,17,80,0.95) 0%, rgba(27,17,80,0.6) 35%, transparent 65%);\n  --bb-glow-purple:     radial-gradient(circle at 50% 50%, rgba(84,0,165,0.55) 0%, transparent 70%);\n  --bb-glow-pink:       radial-gradient(circle at 50% 50%, rgba(254,66,117,0.45) 0%, transparent 70%);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --bb-font-display: \"Oswald\", \"Bebas Neue\", \"Impact\", system-ui, sans-serif;\n  --bb-font-body:    \"Poppins\", \"Inter\", \"Helvetica Neue\", system-ui, sans-serif;\n\n  /* Display = Oswald, condensed, ALL CAPS, used for headlines, hero, section labels. */\n  --bb-display-1: 800 88px/1.02 var(--bb-font-display); /* hero on 1080+ */\n  --bb-display-2: 700 64px/1.05 var(--bb-font-display); /* page hero */\n  --bb-display-3: 700 44px/1.08 var(--bb-font-display); /* section header */\n  --bb-display-4: 700 32px/1.12 var(--bb-font-display); /* card title */\n\n  /* Body = Poppins. Geometric, neutral, friendly. */\n  --bb-h1:        700 40px/1.15 var(--bb-font-body);\n  --bb-h2:        600 28px/1.2  var(--bb-font-body);\n  --bb-h3:        600 22px/1.3  var(--bb-font-body);\n  --bb-body-lg:   400 20px/1.55 var(--bb-font-body);\n  --bb-body:      400 16px/1.6  var(--bb-font-body);\n  --bb-body-sm:   400 14px/1.55 var(--bb-font-body);\n  --bb-caption:   500 12px/1.5  var(--bb-font-body);\n  --bb-overline:  600 12px/1.0  var(--bb-font-body);  /* uppercase, letterspaced */\n  --bb-button:    600 16px/1.0  var(--bb-font-body);\n\n  /* Letter-spacing helpers */\n  --bb-track-tight: -0.01em;\n  --bb-track-overline: 0.18em;\n  --bb-track-display: 0.005em;\n\n  /* ---------- SPACING (4pt base) ---------- */\n  --bb-space-1:  4px;\n  --bb-space-2:  8px;\n  --bb-space-3:  12px;\n  --bb-space-4:  16px;\n  --bb-space-5:  24px;\n  --bb-space-6:  32px;\n  --bb-space-7:  48px;\n  --bb-space-8:  64px;\n  --bb-space-9:  96px;\n  --bb-space-10: 128px;\n\n  /* ---------- RADII ---------- */\n  --bb-radius-xs: 4px;\n  --bb-radius-sm: 8px;\n  --bb-radius-md: 14px;          /* default card */\n  --bb-radius-lg: 24px;          /* hero card / modal */\n  --bb-radius-xl: 32px;\n  --bb-radius-pill: 999px;       /* CTAs, badges */\n\n  /* ---------- SHADOWS / GLOW ---------- */\n  --bb-shadow-sm:    0 2px 8px rgba(0,0,0,0.25);\n  --bb-shadow-md:    0 12px 28px rgba(0,0,0,0.35);\n  --bb-shadow-lg:    0 24px 64px rgba(0,0,0,0.45);\n  --bb-shadow-card:  0 18px 40px rgba(7,3,30,0.55);\n  --bb-glow-cta:     0 10px 30px rgba(254,66,117,0.45);\n  --bb-glow-purple-sm: 0 8px 24px rgba(84,0,165,0.5);\n\n  /* ---------- MOTION ---------- */\n  --bb-ease-out: cubic-bezier(0.22, 1, 0.36, 1);     /* most UI motion */\n  --bb-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --bb-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* CTA bounce */\n  --bb-dur-fast: 140ms;\n  --bb-dur-base: 220ms;\n  --bb-dur-slow: 420ms;\n\n  /* ---------- LAYOUT ---------- */\n  --bb-container-max: 1240px;\n  --bb-gutter: 24px;\n}\n\n/* ============================================================\n   Element defaults (apply when this stylesheet is the global one)\n   Comment the body block out if importing alongside another reset.\n   ============================================================ */\n\nhtml, body {\n  background: var(--bb-bg);\n  color: var(--bb-fg);\n  font: var(--bb-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1 { font: var(--bb-display-2); text-transform: uppercase; letter-spacing: var(--bb-track-display); }\nh2 { font: var(--bb-display-3); text-transform: uppercase; letter-spacing: var(--bb-track-display); }\nh3 { font: var(--bb-h2); }\nh4 { font: var(--bb-h3); }\np  { font: var(--bb-body); color: var(--bb-fg-muted); }\n\n.bb-overline {\n  font: var(--bb-overline);\n  text-transform: uppercase;\n  letter-spacing: var(--bb-track-overline);\n  color: var(--bb-fg-dim);\n}\n\n/* Gradient text utility — used for stat numbers, accent words */\n.bb-grad-text {\n  background: var(--bb-grad-accent);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* The signature accent bar (top-of-page rule, divider) */\n.bb-accent-bar {\n  height: 6px;\n  width: 100%;\n  background: var(--bb-grad-accent);\n  border-radius: 999px;\n}\n<\u002Fstyle>\n<script src=\"a24dd600-f52c-44df-998f-f6325efac7b1\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  body{background:#e9ebf1;color:#1b1150;font-family:var(--bb-font-body);margin:0;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1340px;margin:0 auto;padding:24px 18px 48px;position:relative;\">\n  <div style=\"background:#f4f4f8;border-radius:10px;box-shadow:0 2px 14px rgba(20,16,60,.10);overflow:hidden;\">\n\n    <!-- HEADER -->\n    <div style=\"background:#fff;border-bottom:1px solid #ececf3;padding:18px 24px 0;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n        <div style=\"display:flex;align-items:center;gap:22px;\">\n          <span style=\"font:700 20px var(--bb-font-display);text-transform:uppercase;letter-spacing:.03em;color:#1b1150;\">Demand<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:8px;font:500 14px var(--bb-font-body);color:#9499a8;\">\n            <span>Holding<\u002Fspan><span style=\"color:#cfd2dd;\">·<\u002Fspan><span style=\"color:#1b1150;font-weight:600;\">Planning<\u002Fspan><span style=\"color:#cfd2dd;\">·<\u002Fspan><span>Dormant<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;font:600 14px var(--bb-font-body);color:#1b1150;\">\n          <span style=\"width:30px;height:30px;border-radius:50%;border:1px solid #e4e4ee;display:inline-flex;align-items:center;justify-content:center;color:#9499a8;\">‹<\u002Fspan>\n          <span>Jun 28 – Jul 11<\u002Fspan>\n          <span style=\"width:30px;height:30px;border-radius:50%;border:1px solid #e4e4ee;display:inline-flex;align-items:center;justify-content:center;color:#9499a8;\">›<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:16px;padding-bottom:14px;\">\n        <div style=\"display:inline-flex;background:#eceaf6;border-radius:999px;padding:3px;\">\n          <span style=\"padding:6px 16px;border-radius:999px;font:600 13px var(--bb-font-body);color:#8a8fa3;\">List<\u002Fspan>\n          <span style=\"padding:6px 16px;border-radius:999px;font:600 13px var(--bb-font-body);color:#1b1150;background:#fff;box-shadow:0 1px 2px rgba(20,16,60,.12);\">Plan<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font:400 13px var(--bb-font-body);color:#9499a8;\">Internal steering calendar · next 14 days · public tour demand, booked vs building<\u002Fspan>\n        <div style=\"margin-left:auto;display:flex;align-items:center;gap:13px;font:500 12px var(--bb-font-body);color:#6b6f80;\">\n          <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:14px;height:9px;border-radius:3px;background:#15a06a;\"><\u002Fspan>Bus committed<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:14px;height:9px;border-radius:3px;border:1.5px dashed #b9a6cf;background:#faf8fc;\"><\u002Fspan>Private pending<\u002Fspan>\n          <span style=\"width:1px;height:13px;background:#e2e2ec;\"><\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#cf8324;\"><\u002Fspan>Close<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#9499a8;\"><\u002Fspan>Weak<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#c2410c;\"><\u002Fspan>No bus<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- GRID -->\n    <div style=\"padding:16px 22px 4px;\">\n      <div style=\"font:400 13px var(--bb-font-body);color:#8a8fa3;margin-bottom:12px;\">Each public slot splits <strong style=\"color:#1b1150;font-weight:600;\">booked<\u002Fstrong> (paid, solid bar) from <strong style=\"color:#1b1150;font-weight:600;\">building<\u002Fstrong> (movable demand, light bar); the empty bar is what's still needed. <strong style=\"color:#5b46e0;font-weight:600;\">Click a day<\u002Fstrong> to open its roster and plan moves.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:8px;font:600 11px var(--bb-font-body);letter-spacing:.1em;text-transform:uppercase;text-align:center;\">\n        <div style=\"color:#5b46e0;\">Sun<\u002Fdiv><div style=\"color:#9499a8;\">Mon<\u002Fdiv><div style=\"color:#9499a8;\">Tue<\u002Fdiv><div style=\"color:#9499a8;\">Wed<\u002Fdiv><div style=\"color:#9499a8;\">Thu<\u002Fdiv><div style=\"color:#5b46e0;\">Fri<\u002Fdiv><div style=\"color:#5b46e0;\">Sat<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:start;\">\n        <sc-for list=\"{{ days }}\" as=\"day\" hint-placeholder-count=\"14\">\n          <div onclick=\"{{ day.open }}\" style=\"min-height:170px;background:{{ day.cellBg }};border:1px solid #e8e8f0;border-radius:12px;padding:9px 10px;cursor:pointer;\" style-hover=\"border:1px solid #5b46e0;box-shadow:0 2px 10px rgba(91,70,224,.12);\">\n            <div style=\"margin-bottom:6px;\">\n              <span style=\"font:700 18px var(--bb-font-display);color:{{ day.dateColor }};\">{{ day.date }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-for list=\"{{ day.confirmed }}\" as=\"b\" hint-placeholder-count=\"0\">\n              <div style=\"background:#15a06a;color:#fff;border-radius:7px;padding:5px 8px;margin-bottom:5px;display:flex;align-items:center;gap:5px;font:600 11px var(--bb-font-body);\">\n                <span style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ b.label }}<\u002Fspan><span style=\"opacity:.8;font-weight:500;\">{{ b.tag }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-for list=\"{{ day.pending }}\" as=\"pp\" hint-placeholder-count=\"0\">\n              <div style=\"border:1.5px dashed #b9a6cf;background:#faf8fc;border-radius:7px;padding:5px 8px;margin-bottom:5px;\">\n                <div style=\"display:flex;align-items:center;gap:5px;font:600 11px var(--bb-font-body);color:#7a5ea8;\">\n                  <span style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">Private · pending · {{ pp.time }}<\u002Fspan><span style=\"font-size:10px;\">⚠<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font:500 9px var(--bb-font-body);color:#9b8bb5;margin-top:1px;\">Unpaid link · could take the bus<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-for list=\"{{ day.visibleBuilding }}\" as=\"slot\" hint-placeholder-count=\"2\">\n              <div draggable=\"{{ slot.draggable }}\" onclick=\"{{ slot.open }}\" ondragstart=\"{{ slot.onDragStart }}\" ondragover=\"{{ slot.onDragOver }}\" ondrop=\"{{ slot.onDrop }}\" ondragend=\"{{ slot.onDragEnd }}\" style=\"margin-top:7px;padding:5px;border-radius:8px;cursor:pointer;opacity:{{ slot.dim }};box-shadow:{{ slot.glow }};background:{{ slot.dropBg }};\">\n                <div style=\"display:flex;align-items:center;gap:6px;\">\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:{{ slot.catColor }};flex:none;\"><\u002Fspan>\n                  <span style=\"font:600 12px var(--bb-font-display);text-transform:uppercase;letter-spacing:.02em;color:#1b1150;\">{{ slot.cat }}<\u002Fspan>\n                  <span style=\"margin-left:auto;font:700 11px var(--bb-font-body);color:{{ slot.statusColor }};\">{{ slot.countText }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:4px;display:flex;height:6px;border-radius:999px;background:#ececf3;overflow:hidden;\">\n                  <div style=\"width:{{ slot.bookedPct }}%;background:{{ slot.statusColor }};\"><\u002Fdiv>\n                  <div style=\"width:{{ slot.buildingPct }}%;background:{{ slot.statusLight }};\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:3px;font:500 10px var(--bb-font-body);color:#9499a8;\">{{ slot.splitText }}<\u002Fdiv>\n                <sc-if value=\"{{ slot.showToGo }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:1px;font:700 10px var(--bb-font-body);color:#cf8324;\">{{ slot.toGoText }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ slot.alarm }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:3px;display:flex;align-items:center;gap:4px;font:700 10px var(--bb-font-body);color:#c2410c;background:#fbe7e0;border-radius:5px;padding:2px 6px;\"><span>⚠<\u002Fspan><span style=\"flex:1;\">{{ slot.alarmText }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ slot.hasSteer }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:3px;font:600 10px var(--bb-font-body);color:#2f6fc0;\">↗ {{ slot.steer }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ slot.isSource }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:5px;display:flex;align-items:center;gap:5px;font:600 10px var(--bb-font-body);color:{{ slot.srcStatusColor }};background:{{ slot.srcStatusBg }};border-radius:6px;padding:3px 6px;\">\n                    <span style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">→ {{ slot.plannedIntoLabel }}<\u002Fspan><span>{{ slot.srcStatusLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ slot.isKeeper }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:6px;margin-left:5px;padding-left:8px;border-left:2px solid #c9c4ec;\">\n                    <div style=\"font:600 9px var(--bb-font-body);letter-spacing:.08em;text-transform:uppercase;color:#8a86b8;margin-bottom:4px;\">Combined here<\u002Fdiv>\n                    <sc-for list=\"{{ slot.adds }}\" as=\"a\" hint-placeholder-count=\"1\">\n                      <div style=\"display:flex;align-items:center;gap:4px;margin-bottom:4px;\">\n                        <span style=\"flex:1;font:500 10px var(--bb-font-body);color:#4b4f63;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">↳ {{ a.label }} · {{ a.guests }} building<\u002Fspan>\n                        <span style=\"font:600 9px var(--bb-font-body);color:{{ a.statusColor }};background:{{ a.statusBg }};border-radius:999px;padding:1px 6px;white-space:nowrap;\">{{ a.statusLabel }}<\u002Fspan>\n                        <sc-if value=\"{{ a.isPlanned }}\" hint-placeholder-val=\"{{ false }}\"><span onclick=\"{{ a.remove }}\" style=\"cursor:pointer;color:#b3b7c4;font-weight:700;font-size:11px;\">✕<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                    <div style=\"margin-top:3px;font:700 10px var(--bb-font-body);color:{{ slot.combineColor }};\">If accepted: {{ slot.combinedText }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-if value=\"{{ day.hasMore }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ day.open }}\" style=\"margin-top:7px;text-align:center;font:600 10px var(--bb-font-body);color:#5b46e0;background:#eceaf9;border-radius:6px;padding:4px;cursor:pointer;\">+{{ day.moreCount }} more · open day<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ day.isEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font:400 11px var(--bb-font-body);color:#c4c7d2;font-style:italic;margin-top:8px;\">No public demand<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PLANNED MOVES TRAY (calendar pocket-combine — Card 2+) -->\n    <sc-if value=\"{{ hasCombines }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#f6f5fc;border-top:1px solid #e6e4f3;padding:18px 24px 24px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <span style=\"font:700 16px var(--bb-font-display);text-transform:uppercase;letter-spacing:.02em;color:#1b1150;\">Planned moves<\u002Fspan>\n          <div style=\"margin-left:auto;display:flex;align-items:center;gap:8px;\">\n            <span onclick=\"{{ undo }}\" style=\"cursor:pointer;font:600 12px var(--bb-font-body);color:#6b6f80;padding:6px 12px;border-radius:999px;border:1px solid #d6cff0;\">↶ Undo<\u002Fspan>\n            <span onclick=\"{{ clearAll }}\" style=\"cursor:pointer;font:600 12px var(--bb-font-body);color:#6b6f80;padding:6px 12px;border-radius:999px;border:1px solid #d6cff0;\">Clear planned<\u002Fspan>\n            <span onclick=\"{{ commit }}\" style=\"cursor:pointer;font:700 12px var(--bb-font-body);color:#fff;background:{{ commitBg }};padding:8px 18px;border-radius:999px;box-shadow:0 4px 14px rgba(254,66,117,.30);\">Create {{ pendingCount }} offer proposal(s)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;\">\n          <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"background:#fff;border:1px solid #e8e8f0;border-radius:14px;padding:15px 17px;\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px;\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ g.color }};flex:none;\"><\u002Fspan>\n                <span style=\"font:600 15px var(--bb-font-display);text-transform:uppercase;color:#1b1150;\">{{ g.title }}<\u002Fspan>\n                <span style=\"margin-left:auto;font:700 13px var(--bb-font-body);color:{{ g.resultColor }};\">{{ g.resultText }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font:500 12px var(--bb-font-body);color:#9499a8;margin-bottom:10px;\">{{ g.baseLine }}<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                <sc-for list=\"{{ g.rows }}\" as=\"r\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;align-items:center;gap:10px;background:#f7f7fb;border:1px solid #ececf3;border-radius:10px;padding:9px 12px;\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:{{ r.statusColor }};flex:none;\"><\u002Fspan>\n                    <span style=\"font:600 13px var(--bb-font-body);color:#1b1150;\">{{ r.from }}<\u002Fspan>\n                    <span style=\"font:500 12px var(--bb-font-body);color:#9499a8;\">· {{ r.guests }} building<\u002Fspan>\n                    <span style=\"margin-left:auto;font:600 11px var(--bb-font-body);color:{{ r.statusColor }};background:{{ r.statusBg }};border-radius:999px;padding:2px 9px;\">{{ r.statusLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:11px;font:600 12px var(--bb-font-body);color:{{ g.footColor }};\">{{ g.footNote }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- DAY MODAL — per-guest move workspace -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(20,16,60,.42);z-index:50;\"><\u002Fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:1000px;max-width:95vw;max-height:88vh;background:#fff;border-radius:14px;z-index:51;box-shadow:0 24px 70px rgba(20,16,60,.34);display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"padding:16px 22px;border-bottom:1px solid #ececf3;display:flex;align-items:center;gap:14px;\">\n        <span style=\"font:700 17px var(--bb-font-display);text-transform:uppercase;letter-spacing:.02em;color:#1b1150;\">Plan day<\u002Fspan>\n        <span style=\"font:600 14px var(--bb-font-body);color:#5b46e0;background:#eceaf9;border-radius:999px;padding:3px 12px;\">{{ modal.range }}<\u002Fspan>\n        <div style=\"margin-left:auto;display:flex;align-items:center;gap:12px;\">\n          <span onclick=\"{{ undoMove }}\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:5px;font:600 13px var(--bb-font-body);color:{{ modal.undoColor }};\">↶ Undo<\u002Fspan>\n          <span onclick=\"{{ closeModal }}\" style=\"cursor:pointer;width:30px;height:30px;border-radius:50%;border:1px solid #e4e4ee;display:inline-flex;align-items:center;justify-content:center;color:#9499a8;\">✕<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:9px 22px;font:400 13px var(--bb-font-body);color:#9499a8;border-bottom:1px solid #f3f3f7;\">Drag a <strong style=\"color:#6b6f80;font-weight:600;\">party<\u002Fstrong> by the ⠿ handle to another day or tour of the same category — you move the whole group, never part of it. Projections show the result <strong style=\"color:#6b6f80;font-weight:600;\">if accepted<\u002Fstrong>; the real count doesn't change until the customer says yes. Paid parties are pinned.<\u002Fdiv>\n\n      <div style=\"flex:1;overflow-y:auto;padding:18px 22px;background:#fafafc;\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n          <sc-for list=\"{{ modal.days }}\" as=\"d\" hint-placeholder-count=\"2\">\n            <div>\n              <div style=\"font:700 19px var(--bb-font-display);margin-bottom:12px;\"><span style=\"color:#1b1150;\">{{ d.dow }}<\u002Fspan> <span style=\"color:#9499a8;font-weight:500;\">{{ d.label }}<\u002Fspan><\u002Fdiv>\n              <sc-for list=\"{{ d.tours }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div ondragover=\"{{ t.onDragOver }}\" ondragenter=\"{{ t.onDragEnter }}\" ondrop=\"{{ t.onDrop }}\" style=\"border:{{ t.boxBorder }};background:{{ t.boxBg }};border-radius:13px;padding:13px 14px;margin-bottom:12px;\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px;\">\n                    <span style=\"width:8px;height:8px;border-radius:50%;background:{{ t.catColor }};flex:none;\"><\u002Fspan>\n                    <span style=\"font:600 15px var(--bb-font-display);text-transform:uppercase;letter-spacing:.02em;color:{{ t.titleColor }};\">{{ t.cat }} · {{ t.time }}<\u002Fspan>\n                    <span style=\"margin-left:auto;font:700 14px var(--bb-font-body);color:{{ t.projColor }};\">{{ t.projText }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                    <sc-for list=\"{{ t.parties }}\" as=\"p\" hint-placeholder-count=\"2\">\n                      <sc-if value=\"{{ p.isGhost }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"display:flex;align-items:center;gap:10px;border:1.5px dashed #c2c5d2;border-radius:10px;padding:9px 12px;background:#fafafc;\">\n                          <span style=\"color:#c2c5d2;font-size:13px;letter-spacing:1.5px;\">⠿<\u002Fspan>\n                          <span style=\"flex:1;font:500 13px var(--bb-font-body);color:#aeb2c0;font-style:italic;\"        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ t.dropHint }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:9px;font:600 12px var(--bb-font-body);color:#5b46e0;\">↓ drop to add — {{ t.toGoAfter }} to go after<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ t.noBuild }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font:400 12px var(--bb-font-body);color:#bcbfca;font-style:italic;\">all booked · no movable demand<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ d.noTours }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font:400 13px var(--bb-font-body);color:#bcbfca;font-style:italic;\">No public demand this day.<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid #ececf3;background:#f6f5fc;padding:14px 22px;\">\n        <div style=\"font:600 13px var(--bb-font-body);color:#3a2db0;margin-bottom:9px;\">Holding — public building demand for these tours across the 14 days <span style=\"font-weight:400;color:#8a86b8;\">(drag onto a matching slot · private-pending stays out)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;max-height:108px;overflow-y:auto;\">\n          <sc-for list=\"{{ modal.holding }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <div draggable=\"true\" ondragstart=\"{{ h.onDragStart }}\" ondragend=\"{{ h.onDragEnd }}\" style=\"display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e0f0;border-radius:10px;padding:8px 12px;cursor:grab;\">\n              <span style=\"color:#bcc0cd;font-size:13px;letter-spacing:1.5px;\">⠿<\u002Fspan>\n              <span style=\"font:600 13px var(--bb-font-body);color:#1b1150;\">{{ h.name }}<\u002Fspan>\n              <span style=\"font:600 12px var(--bb-font-body);color:#5b46e0;background:#eceaf9;border-radius:999px;padding:1px 8px;\">{{ h.size }}<\u002Fspan>\n              <span style=\"font:400 12px var(--bb-font-body);color:#9499a8;\">{{ h.want }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ modal.holdingMore }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;align-items:center;font:600 12px var(--bb-font-body);color:#8a86b8;padding:8px 4px;\">+{{ modal.holdingMore }} more across the week<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ modal.holdingEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font:400 12px var(--bb-font-body);color:#aeb2c0;font-style:italic;padding:8px 0;\">No movable demand for these tours elsewhere this week.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;threshold&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10,&quot;min&quot;:6,&quot;max&quot;:14,&quot;unit&quot;:&quot; guests&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Planning&quot;},&quot;highlightWeekends&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Planning&quot;}}\">\nclass Component extends DCLogic {\n  state = { drag: null, combines: [], openDay: null, moves: [], hover: null, gdrag: null };\n\n  ST(){\n    return {\n      planned:  { label:'Planned',    color:'#6b6f80', bg:'#eef0f5' },\n      sent:     { label:'Offer sent', color:'#cf8324', bg:'#faf0db' },\n      accepted: { label:'Accepted',   color:'#15803d', bg:'#e7f6ec' },\n      declined: { label:'Declined',   color:'#aeb2c0', bg:'#eef0f5' },\n    };\n  }\n\n  openDayFn(i){ this.setState({ openDay:i }); }\n  closeModal(){ this.setState({ openDay:null, gdrag:null, hover:null }); }\n\n  // ---- per-guest moves (modal) ----\n  startGuest(info){ this.setState({ gdrag:info, hover:null }); }\n  endGuest(){ this.setState({ gdrag:null, hover:null }); }\n  setHover(key){ if (this.state.gdrag && this._validTarget(key)) this.setState({ hover:key }); }\n  dropGuest(toKey){ const d = this.state.gdrag; if (!d || !this._validTarget(toKey)){ this.endGuest(); return; } this.setState({ moves: this.state.moves.concat([{ pid:d.pid, to:toKey }]), gdrag:null, hover:null }); }\n  undoMove(){ this.setState(s => ({ moves: s.moves.slice(0, -1) })); }\n  _validTarget(key){ const d = this.state.gdrag; if (!d) return false; const pk = this._map[key]; if (!pk || !pk.isDemand) return false; if (d.cat !== 'any' && pk.cat !== d.cat) return false; if (key === d.from) return false; return true; }\n\n  // ---- pocket combine (calendar) ----\n  dragStart(key, e){ if (e && e.dataTransfer){ e.dataTransfer.effectAllowed='move'; try { e.dataTransfer.setData('text/plain', key); } catch(_){} } this.setState({ drag:key }); }\n  dragEnd(){ this.setState({ drag:null }); }\n  dropOn(key){ const src = this.state.drag; if (!src || !this.compatible(src, key)){ this.setState({ drag:null }); return; } const combines = this.state.combines.filter(c => c.src !== src); combines.push({ src, dst:key, status:'planned' }); this.setState({ combines, drag:null }); }\n  removeCombine(src){ this.setState(s => ({ combines: s.combines.filter(c => c.src !== src) })); }\n  undo(){ const c = this.state.combines.slice(); for (let i = c.length - 1; i >= 0; i--){ if (c[i].status === 'planned'){ c.splice(i,1); break; } } this.setState({ combines:c }); }\n  clearAll(){ this.setState({ combines: this.state.combines.filter(c => c.status !== 'planned') }); }\n  commit(){ const totals = this.groupTotals(); const combines = this.state.combines.map(c => (c.status === 'planned' && totals[c.dst] && totals[c.dst].runnable) ? Object.assign({}, c, { status:'sent' }) : c); this.setState({ combines }); }\n  compatible(srcKey, dstKey){ const m = this._map || {}; const src = m[srcKey], dst = m[dstKey]; if (!src || !dst || srcKey === dstKey || src.cat !== dst.cat) return false; const sources = new Set(this.state.combines.map(c => c.src)); const keepers = new Set(this.state.combines.map(c => c.dst)); if (sources.has(dstKey)) return false; if (keepers.has(srcKey)) return false; return true; }\n  groupTotals(){ const m = this._map || {}; const threshold = this.props.threshold ?? 10; const out = {}; const byDst = {}; this.state.combines.forEach(c => { (byDst[c.dst] = byDst[c.dst] || []).push(c); }); Object.keys(byDst).forEach(dst => { const keeper = m[dst]; if (!keeper) return; const live = byDst[dst].filter(c => c.status !== 'declined'); const total = keeper.guests + live.reduce((t,c) => t + (m[c.src] ? m[c.src].movable : 0), 0); out[dst] = { total, runnable: total >= threshold && keeper.busFree, busFree: keeper.busFree }; }); return out; }\n\n  CATS(){ return {\n    BBQ:{name:'BBQ',color:'#c1571a'}, Brewery:{name:'Brewery',color:'#2f6fc0'},\n    Winery:{name:'Winery',color:'#b03a76'}, Ghost:{name:'Ghost',color:'#6d3fbf'},\n    Sightseeing:{name:'Sightseeing',color:'#3f7d6e'}, Buyout:{name:'Private Buyout',color:'#7a7f93'} }; }\n  POOL(){ return ['Carrie B','Dana R','Meg L','Joe P','Sam K','Priya N','Alex T','Jordan M','Liz W','Tom H','Nina F','Raj P','Beth C','Omar S','Kate M','Ely F','Marco V','Tess O']; }\n  FLEX(){ return ['flexible · any weekend','flexible · evenings ok','flexible · ±3 days','prefers this date','open to nearby dates','flexible · Fri or Sat']; }\n\n  RAW(){\n    return [\n      [{c:'BBQ',g:7,bk:1,t:'1 PM'},{c:'Winery',g:4,bk:0,t:'12 PM'},{c:'Buyout',kind:'booked',t:'6 PM',bus:'Bus 2'}],\n      [{c:'BBQ',g:2,bk:0,t:'1 PM'}],\n      [],\n      [{c:'BBQ',g:3,bk:0,t:'1 PM'},{c:'Sightseeing',g:2,bk:0,t:'10 AM'}],\n      [{c:'BBQ',g:4,bk:1,t:'1 PM'},{c:'Ghost',g:2,bk:0,t:'8 PM'}],\n      [{c:'Ghost',g:9,bk:2,t:'8 PM'},{c:'Brewery',g:5,bk:0,t:'12 PM'},{c:'BBQ',g:5,bk:0,t:'1 PM'}],\n      [{c:'Winery',g:10,bk:6,bus:'available',t:'12 PM'},{c:'Brewery',g:8,bk:2,t:'4:30 PM'},{c:'Ghost',g:10,bk:3,bus:'none',t:'8 PM',busRisk:true},{c:'BBQ',g:6,bk:2,t:'1 PM'},{c:'Buyout',kind:'booked',t:'7 PM',bus:'Bus 3'},{c:'Buyout',kind:'private_pending',t:'9 PM'}],\n      [{c:'BBQ',g:8,bk:2,t:'1 PM'},{c:'Brewery',g:6,bk:1,t:'12 PM'},{c:'Winery',g:3,bk:0,t:'12 PM'}],\n      [],\n      [{c:'BBQ',g:2,bk:0,t:'1 PM'}],\n      [{c:'Ghost',g:3,bk:0,t:'8 PM'}],\n      [{c:'BBQ',g:4,bk:0,t:'1 PM'},{c:'Sightseeing',g:2,bk:0,t:'10 AM'}],\n      [{c:'Ghost',g:6,bk:1,t:'8 PM'},{c:'Brewery',g:7,bk:2,t:'12 PM'},{c:'BBQ',g:5,bk:0,t:'1 PM'}],\n      [{c:'Winery',g:10,bk:5,bus:'available',t:'12 PM'},{c:'Brewery',g:9,bk:2,t:'4:30 PM'},{c:'Ghost',g:7,bk:1,t:'8 PM',busRisk:true},{c:'BBQ',g:5,bk:0,t:'1 PM'},{c:'Sightseeing',g:3,bk:0,t:'10 AM'},{c:'Buyout',kind:'booked',t:'6 PM',bus:'Bus 1'}],\n    ];\n  }\n  HOLD(){ return [\n    { name:'Alex Tran', size:2, cat:'Brewery', want:'wants Brewery' },\n    { name:'Priya N',   size:4, cat:'any',     want:'flexible' },\n    { name:'Liz Ward',  size:3, cat:'Ghost',   want:'wants Ghost' },\n    { name:'Tom Hale',  size:2, cat:'any',     want:'flexible' },\n  ]; }\n\n  busFreeFor(slot){ if (slot.bus === 'available') return true; if (slot.bus === 'none') return false; if (slot.busRisk) return false; return true; }\n\n  makeParties(seed, total, booked){\n    const names = this.POOL(); const sizes = [2,1,2,1,3,2,1,2,1]; const flex = this.FLEX();\n    const out = []; let rem = total, i = 0, cum = 0;\n    while (rem > 0 && i < 24){\n      const s = Math.min(sizes[i % sizes.length], rem);\n      const paid = cum < booked;\n      out.push({ name: names[(seed + i) % names.length], size: s, paid,\n        note: paid ? 'confirmed · paid' : flex[(seed + i) % flex.length],\n        badge: paid ? 'Paid' : 'Building', badgeColor: paid ? '#15803d' : '#6b6f80',\n        badgeBg: paid ? '#e7f6ec' : '#eef0f5', dot: paid ? '#15803d' : '#c2c5d2' });\n      rem -= s; cum += s; i++;\n    }\n    return out;\n  }\n\n  decorate(slot, di, si, threshold){\n    const c = this.CATS()[slot.c];\n    if (slot.kind === 'booked') return { isBooked:true, cat:c.name, catColor:c.color, time:slot.t, busLabel:slot.bus || 'a bus' };\n    if (slot.kind === 'private_pending') return { isPending:true, cat:c.name, time:slot.t };\n    const g = slot.g; const bk = slot.bk || 0; const building = g - bk;\n    const baseStatus = g >= threshold ? 'running' : g >= 6 ? 'close' : 'weak';\n    const busOk = slot.bus === 'available';\n    const blocked = baseStatus === 'running' && !busOk;\n    const confirmedReady = baseStatus === 'running' && busOk;\n    const remaining = Math.max(0, threshold - g);\n    const LIGHT = { '#14a06a':'#8fd6b4', '#cf8324':'#ecc78c', '#9499a8':'#c9ccd5', '#c2410c':'#e3a98c' };\n    let statusColor, miniNote;\n    if (blocked){ statusColor='#c2410c'; miniNote='no bus this window'; }\n    else if (confirmedReady){ statusColor='#14a06a'; miniNote='runnable'; }\n    else if (baseStatus === 'close'){ statusColor='#cf8324'; miniNote=remaining+' to go'; }\n    else { statusColor='#9499a8'; miniNote='weak · '+remaining+' to go'; }\n    const splitText = bk > 0 ? (bk + ' booked · ' + building + ' building') : (building + ' building');\n    const bookedPct = Math.min(100, Math.round(bk / threshold * 100));\n    const buildingPct = Math.min(Math.max(0, 100 - bookedPct), Math.round(building / threshold * 100));\n    return { isBooked:false, isPending:false, isDemand:true, cat:c.name, catColor:c.color, time:slot.t,\n      guests:g, booked:bk, building, movable:building, threshold, status:baseStatus, busOk, blocked, confirmedReady, remaining,\n      busFree: this.busFreeFor(slot), statusColor, statusLight: LIGHT[statusColor] || '#c9ccd5',\n      miniNote, splitText, bookedPct, buildingPct, countText: g+'/'+threshold,\n      showToGo: baseStatus === 'close', toGoText: remaining + ' to go',\n      parties: this.makeParties(di*7+si, g, bk) };\n  }\n\n  buildDays(threshold, hw){\n    const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    const start = new Date(2026,5,28); const raw = this.RAW();\n    const map = {};\n    const days = raw.map((slots, di) => {\n      const d = new Date(start); d.setDate(28 + di); const dn = d.getDay(); const isWeekend = [0,5,6].includes(dn);\n      const dow = DOW[dn], mon = MON[d.getMonth()], date = d.getDate();\n      const confirmed = [], pending = [], building = [];\n      slots.forEach((s, si) => {\n        const o = this.decorate(s, di, si, threshold);\n        if (o.isBooked){ confirmed.push({ isSold:true, label:'Private · '+o.time, tag:o.busLabel }); return; }\n        if (o.isPending){ pending.push({ time:o.time }); return; }\n        if (o.confirmedReady){ confirmed.push({ isReady:true, label:o.cat+' · '+o.time, tag:'✓' }); return; }\n        const key = di + '-' + si; o.key = key; o.di = di; o.dayLabel = dow+' '+mon+' '+date; o.dayShort = dow+' '+date;\n        building.push(o); map[key] = o;\n      });\n      const visibleBuilding = building.slice(0, 3);\n      const moreCount = Math.max(0, building.length - 3);\n      return { idx:di, dow, mon, date, isWeekend, confirmed, pending, building, visibleBuilding,\n        moreCount, hasMore: moreCount > 0,\n        isEmpty: confirmed.length === 0 && pending.length === 0 && building.length === 0,\n        dateColor:(isWeekend && hw) ? '#5b46e0' : '#1b1150',\n        cellBg:(isWeekend && hw) ? '#faf8ff' : '#ffffff',\n        label: mon+' '+date,\n        open: () => this.openDayFn(di) };\n    });\n\n    this._map = map;\n\n    const all = Object.keys(map).map(k => map[k]);\n    all.forEach(p => {\n      p.hasSteer = false; p.alarm = false; p.plainNote = true;\n      if (!p.blocked) return;\n      p.plainNote = false; p.alarm = p.booked > 0; p.alarmText = p.booked + ' booked · no bus assigned — resolve';\n      const alts = all.filter(q => q.cat === p.cat && q.busFree && q.key !== p.key && (q.status === 'running' || q.status === 'close'));\n      alts.sort((a,b) => Math.abs(a.di - p.di) - Math.abs(b.di - p.di));\n      if (alts[0]){ p.hasSteer = true; p.steer = p.booked > 0 ? (p.building + ' building → ' + alts[0].dayShort + ' ' + p.cat + ' · bus free') : ('Try ' + alts[0].dayShort + ' ' + p.cat + ' · bus available'); }\n    });\n\n    const ST = this.ST(); const combines = this.state.combines; const drag = this.state.drag;\n    const srcEntry = {}; combines.forEach(c => { srcEntry[c.src] = c; });\n    const keeperAdds = {}; combines.forEach(c => { (keeperAdds[c.dst] = keeperAdds[c.dst] || []).push(c); });\n\n    Object.keys(map).forEach(key => {\n      const p = map[key];\n      p.draggable = !keeperAdds[key];\n      p.open = () => this.openDayFn(p.di);\n      p.onDragStart = (e) => this.dragStart(key, e);\n      p.onDragOver = (e) => { if (this.compatible(drag, key)) e.preventDefault(); };\n      p.onDrop = (e) => { e.preventDefault(); this.dropOn(key); };\n      p.onDragEnd = () => this.dragEnd();\n      const se = srcEntry[key];\n      p.isSource = !!se;\n      if (se){ const st = ST[se.status]; p.plannedIntoLabel = map[se.dst] ? map[se.dst].dayLabel : ''; p.srcStatusLabel = st.label; p.srcStatusColor = st.color; p.srcStatusBg = st.bg; }\n      const adds = keeperAdds[key] || [];\n      p.isKeeper = adds.length > 0;\n      p.adds = adds.map(c => { const st = ST[c.status]; return { label: map[c.src].dayShort, guests: map[c.src].movable, statusLabel: st.label, statusColor: st.color, statusBg: st.bg, isPlanned: c.status === 'planned', remove: () => this.removeCombine(c.src) }; });\n      if (p.isKeeper){\n        const live = adds.filter(c => c.status !== 'declined');\n        const total = p.guests + live.reduce((t,c) => t + map[c.src].movable, 0);\n        if (total >= threshold && p.busFree){ p.combineColor='#15803d'; p.combinedText = total+'/'+threshold+' · bus available · runnable'; }\n        else if (total < threshold){ p.combineColor='#cf8324'; p.combinedText = total+'/'+threshold+' · '+(threshold-total)+' more to go'; }\n        else { p.combineColor='#c2410c'; p.combinedText = total+'/'+threshold+' · no bus · not runnable'; }\n      }\n      if (drag){\n        if (key === drag){ p.dim='0.5'; p.glow='0 0 0 2px #5b46e0'; p.dropBg='transparent'; }\n        else if (this.compatible(drag, key)){ p.dim='1'; p.glow='0 0 0 2px #15a06a'; p.dropBg='#eafaf1'; }\n        else { p.dim='0.4'; p.glow='none'; p.dropBg='transparent'; }\n      } else { p.dim='1'; p.glow='none'; p.dropBg='transparent'; }\n    });\n\n    return days;\n  }\n\n  buildModal(days, threshold){\n    const od = this.state.openDay; if (od == null) return null;\n    const a = od < days.length - 1 ? od : days.length - 2;\n    const pair = [a, a + 1];\n\n    // registry of every guest party + holding\n    const reg = {};\n    Object.keys(this._map).forEach(key => {\n      const pk = this._map[key];\n      pk.parties.forEach((p, idx) => { const pid = key + '#' + idx; reg[pid] = { pid, name:p.name, size:p.size, paid:p.paid, note:p.note, cat:pk.cat, time:pk.time, home:key }; });\n    });\n    this.HOLD().forEach((h, i) => { const pid = 'hold#' + i; reg[pid] = { pid, name:h.name, size:h.size, paid:false, cat:h.cat, want:h.want, home:'holding' }; });\n\n    const loc = {}; Object.keys(reg).forEach(pid => { loc[pid] = reg[pid].home; });\n    this.state.moves.forEach(m => { if (reg[m.pid]) loc[m.pid] = m.to; });\n\n    const gd = this.state.hover, drag = this.state.gdrag;\n    const colorFor = (n) => n >= threshold ? '#15803d' : (n >= 6 ? '#cf8324' : '#9499a8');\n\n    const mdays = pair.map(di => {\n      const dd = days[di];\n      const keys = dd.building.map(b => b.key);\n      const tours = keys.map(key => {\n        const pk = this._map[key];\n        const here = Object.keys(reg).filter(pid => loc[pid] === key).map(pid => reg[pid]);\n        here.sort((x,y) => (y.paid?1:0) - (x.paid?1:0));\n        const base = here.reduce((t,p) => t + p.size, 0);\n        const isHover = !!(drag && gd === key && this._validTarget(key));\n        const isSource = !!(drag && drag.from === key);\n        let projected = base;\n        if (isHover) projected = base + drag.size;\n        else if (isSource) projected = base - drag.size;\n        const parties = here.map(p => ({\n          name:p.name, size:p.size, isPaid:p.paid,\n          isGhost: !!(drag && drag.pid === p.pid),\n          isMovable: !p.paid && !(drag && drag.pid === p.pid),\n          onDragStart: () => this.startGuest({ pid:p.pid, from:key, size:p.size, cat:p.cat }),\n          onDragEnd: () => this.endGuest(),\n        }));\n        const movableCount = here.filter(p => !p.paid).length;\n        return {\n          cat:pk.cat, catColor:pk.catColor, time:pk.time,\n          projText: projected !== base ? (base + ' → ' + projected + ' / ' + threshold) : (base + ' / ' + threshold),\n          projColor: colorFor(projected),\n          titleColor: isHover ? '#3a2db0' : '#1b1150',\n          boxBorder: isHover ? '2px dashed #5b46e0' : '1px solid #e8e8f0',\n          boxBg: isHover ? '#f1eefe' : '#fff',\n          dropHint: isHover, toGoAfter: Math.max(0, threshold - projected),\n          noBuild: movableCount === 0 && !isHover,\n          parties,\n          onDragOver: (e) => { if (this._validTarget(key)) e.preventDefault(); },\n          onDragEnter: () => this.setHover(key),\n          onDrop: (e) => { e.preventDefault(); this.dropGuest(key); },\n        };\n      });\n      return { dow: dd.dow, label: dd.label, dateColor: dd.dateColor, tours, noTours: tours.length === 0 };\n    });\n\n    // Holding lane = same-tour PUBLIC building demand pulled from across the 14-day window\n    // (not just adjacent days), excluding the two shown days, paid parties, and private-pending.\n    const pairCats = new Set(); mdays.forEach(d => d.tours.forEach(t => pairCats.add(t.cat)));\n    const shown = new Set(pair);\n    const matchCat = (cat) => cat === 'any' || pairCats.has(cat);\n    const holding = [];\n    // genuinely homeless holding demand first\n    Object.keys(reg).forEach(pid => {\n      if (pid.indexOf('hold#') !== 0 || loc[pid] !== 'holding') return;\n      const h = reg[pid]; if (!matchCat(h.cat)) return;\n      holding.push({ name:h.name, size:h.size, want:h.want,\n        onDragStart: () => this.startGuest({ pid:h.pid, from:'holding', size:h.size, cat:h.cat }),\n        onDragEnd: () => this.endGuest() });\n    });\n    // building parties sitting on OTHER days this window, same category\n    Object.keys(reg).forEach(pid => {\n      const r = reg[pid];\n      if (r.home === 'holding' || r.paid) return;\n      const cur = loc[pid]; if (cur === 'holding') return;\n      const cd = parseInt(cur.split('-')[0], 10);\n      if (shown.has(cd) || !matchCat(r.cat)) return;\n      holding.push({ name:r.name, size:r.size, want:r.cat + ' · ' + days[cd].dow + ' ' + days[cd].date,\n        onDragStart: () => this.startGuest({ pid:r.pid, from:cur, size:r.size, cat:r.cat }),\n        onDragEnd: () => this.endGuest() });\n    });\n    const cap = 12;\n    const holdingMore = Math.max(0, holding.length - cap);\n    const holdingShown = holding.slice(0, cap);\n\n    const A = days[pair[0]], B = days[pair[1]];\n    return {\n      range: A.dow + ' ' + A.label + ' – ' + B.dow + ' ' + B.date,\n      days: mdays, holding: holdingShown, holdingMore, holdingEmpty: holdingShown.length === 0,\n      undoColor: this.state.moves.length ? '#5b46e0' : '#c7cad6',\n    };\n  }\n\n  renderVals(){\n    const threshold = this.props.threshold ?? 10;\n    const hw = this.props.highlightWeekends ?? true;\n    const days = this.buildDays(threshold, hw);\n    const map = this._map; const ST = this.ST();\n    const combines = this.state.combines;\n\n    const byDst = {}; combines.forEach(c => { (byDst[c.dst] = byDst[c.dst] || []).push(c); });\n    const groups = Object.keys(byDst).map(dst => {\n      const keeper = map[dst]; const cs = byDst[dst];\n      const live = cs.filter(c => c.status !== 'declined');\n      const total = keeper.guests + live.reduce((t,c) => t + map[c.src].movable, 0);\n      const runnable = total >= threshold && keeper.busFree;\n      const noBus = total >= threshold && !keeper.busFree;\n      const hasPlanned = cs.some(c => c.status === 'planned');\n      let footColor = '#9499a8', footNote = '';\n      if (runnable && hasPlanned){ footColor='#15803d'; footNote='Ready — Create offer proposals drafts these into the approval queue.'; }\n      else if (runnable){ footColor='#15803d'; footNote='Threshold met · bus free — runnable once offers are accepted.'; }\n      else if (noBus){ footColor='#c2410c'; footNote='No bus this window — keep as signal or retarget a day with a free bus.'; }\n      else { footColor='#cf8324'; footNote='Needs '+(threshold-total)+' more building guest(s) to reach '+threshold+'.'; }\n      const rows = cs.map(c => { const st = ST[c.status]; return { from: map[c.src].dayLabel, guests: map[c.src].movable, statusLabel: st.label, statusColor: st.color, statusBg: st.bg }; });\n      return { title: keeper.cat+' → '+keeper.dayLabel+' '+keeper.time, color: keeper.catColor,\n        resultColor: runnable ? '#15803d' : (noBus ? '#c2410c' : '#cf8324'),\n        resultText: total+'/'+threshold+' · '+(keeper.busFree ? 'bus available' : 'no bus'),\n        baseLine: keeper.guests+' already in this slot · '+cs.length+' pocket(s) folding in',\n        rows, footColor, footNote };\n    });\n\n    const totals = this.groupTotals();\n    const pendingCount = combines.filter(c => c.status === 'planned' && totals[c.dst] && totals[c.dst].runnable).length;\n    const modal = this.buildModal(days, threshold);\n\n    return { days, threshold,\n      hasCombines: combines.length > 0, groups,\n      pendingCount, commitBg: pendingCount > 0 ? '#fe4275' : '#c9b6c0',\n      modalOpen: !!modal, modal: modal || {}, closeModal: () => this.closeModal(), undoMove: () => this.undoMove(),\n      undo: () => this.undo(), clearAll: () => this.clearAll(), commit: () => this.commit() };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
